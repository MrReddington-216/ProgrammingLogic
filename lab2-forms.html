<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 2 – Coffee Order Form</title>
</head>

<body>

    <h1>Coffee Order Form</h1>

    <p>Welcome! Please fill out the form below to place your coffee order.</p>

    <table border="1">
        <tr>
            <th>Link</th>
        </tr>

        <tr>
            <td><a href="lab2-home.html">Lab 2 Home Page</a></td>
        </tr>

        <tr>
            <td><a href="lab2-about.html">Lab 2 About Page</a></td>
        </tr>

        <tr>
            <td><a href="lab2-forms.html">Lab 2 Forms Page</a></td>
        </tr>
    </table>

    <br>

    <form action="https://www.w3schools.com/action_page.php" method="get">

        <label for="name">Customer Name:</label><br>
        <input type="text" id="name" name="customer_name"><br><br>

        <label for="email">Email Address:</label><br>
        <input type="email" id="email" name="email"><br><br>

        <label for="coffee">Coffee Type:</label><br>
        <select id="coffee" name="coffee_type">
            <option value="latte">Latte</option>
            <option value="cappuccino">Cappuccino</option>
            <option value="espresso">Espresso</option>
            <option value="americano">Americano</option>
            <option value="mocha">Mocha</option>
        </select><br><br>

        <label>Size:</label><br>
        <input type="radio" id="small" name="size" value="small">
        <label for="small">Small</label><br>

        <input type="radio" id="medium" name="size" value="medium">
        <label for="medium">Medium</label><br>

        <input type="radio" id="large" name="size" value="large">
        <label for="large">Large</label><br><br>

        <label>Extras:</label><br>
        <input type="checkbox" id="whipped" name="extras" value="whipped_cream">
        <label for="whipped">Whipped Cream</label><br>

        <input type="checkbox" id="shot" name="extras" value="extra_shot">
        <label for="shot">Extra Shot</label><br>

        <input type="checkbox" id="almond" name="extras" value="almond_milk">
        <label for="almond">Almond Milk</label><br><br>

        <label for="instructions">Special Instructions:</label><br>
        <textarea id="instructions" name="special_instructions" rows="4" cols="40"></textarea><br><br>

        <input type="submit" value="Submit Order">

    </form>

</body>
</html>
